<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your Step, Your Statement">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/all.css">
    <title>URBNSTEP</title>
</head>
<body>
    <header>
        <nav class="nav-wrapper">
            <img src="https://raw.githubusercontent.com/hexschool/2022-web-layout-training/refs/heads/main/2025-week1/logo.svg" alt="Urbnstep's logo">
            <ul class="nav-list">
                <li><a href="#">商品列表</a></li>
                <li><a href="#">品牌故事</a></li>
            </ul>
        </nav>
        <img src="assets/login-icon.svg" alt="Login icon">
    </header>
    <main>
        <section class="banner">
            <div class="banner-wrapper">
                <div class="banner-content">
                    <div>
                        <h1>URBNSTEP</h1>
                        <p>Your Step, Your Statement</p>
                    </div>
                    <a href="#" class="banner-button">立即選購</a>
                </div>
            </div>
        </section>
        <section class="new-arrival">
            <div class="new-arrival-title">
                <h2>New Arrival</h2>
                <h3>新品上市</h3>
            </div>
            <div class="new-arrival-list">
                <div class="new-arrival-item">
                    <a href="#">
                        <img src="https://raw.githubusercontent.com/hexschool/2022-web-layout-training/refs/heads/main/2025-week3-4/new-1.png" alt="New product1 image">
                        <div class="new-arrival-content">
                            <h4>Monoverse</h4>
                            <p>NT$3,600</p>
                        </div>
                    </a>
                </div>
                <div class="new-arrival-item">
                    <a href="#">
                        <img src="https://raw.githubusercontent.com/hexschool/2022-web-layout-training/refs/heads/main/2025-week3-4/new-2.png" alt="New product2 image">
                        <div class="new-arrival-content">
                            <h4>PLATFORM 404</h4>
                            <p>NT$2,600</p>
                        </div>
                    </a>
                </div>
                <div class="new-arrival-item">
                    <a href="#">
                        <img src="https://raw.githubusercontent.com/hexschool/2022-web-layout-training/refs/heads/main/2025-week3-4/new-3.png" alt="New product3 image">
                        <div class="new-arrival-content">
                            <h4>URBN Force</h4>
                            <p>NT$3,200</p>
                        </div>
                    </a>
                </div>
                <div class="new-arrival-item">
                    <a href="#">
                        <img src="https://raw.githubusercontent.com/hexschool/2022-web-layout-training/refs/heads/main/2025-week3-4/new-4.png" alt="New product4 image">
                        <div class="new-arrival-content">
                            <h4>Mode90</h4>
                            <p>NT$4,000</p>
                        </div>
                    </a>
                </div>
            </div>
        </section>
        <section class="best-seller">
            <div class="best-seller-list">
                <h3>熱銷補貨</h3>
                <ul>
                    <li>
                        <a href="#">
                            <img src="assets/best-seller-image1.svg" alt="Best seller image1">
                            <span class="best-seller-note">人氣 No.1</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <img src="assets/best-seller-image2.svg" alt="Best seller image2">
                            <span class="best-seller-note">人氣 No.1</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <img src="assets/best-seller-image3.svg" alt="Best seller image3">
                            <span class="best-seller-note">人氣 No.1</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <img src="assets/best-seller-image4.svg" alt="Best seller image4">
                            <span class="best-seller-note">人氣 No.1</span>
                        </a>
                    </li>
                </ul>
            </div>
        </section>
        <section class="sale">
            <div class="sale-wrapper">
                <div class="sale-content">
                    <div class="sale-title">
                        <h2>URBNSTEP</h2>
                        <span>x</span> 
                        <h2>Kevin Chen</h2>
                    </div>
                    <h3>跨界聯名，限量發售</h3>
                    <p>新銳漫畫家 Kevin Chen 親自操刀設計，街頭能量全面引爆！</p>
                    <a href="#" class="sale-button">立即搶購</a>
                </div>
                <!-- <img src="https://raw.githubusercontent.com/hexschool/2022-web-layout-training/refs/heads/main/2025-week3-4/star.svg" alt="Star" class="star"> -->
                <ul class="dots">
                    <li class="active"><span></span></li>
                    <li><span></span></li>
                    <li><span></span></li>
                    <li><span></span></li>
                    <li><span></span></li>
                </ul>
            </div>
        </section>

</html>
